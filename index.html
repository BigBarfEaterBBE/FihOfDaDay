<!DOCTYPE html>
<html>
    <head>
        <title>Fih of Dih Day</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <img id="title-image" src="static\title.PNG" alt="Fish of the Day">
        <div id="jellyfish-container"></div>
        <div id="fish-info">
            <p>Loading...</p>
        </div>
        <div id="music-player">
            <img id="player-image" src = "static/empty_player.png">
            <audio id="audio"></audio>
        </div>
        <script>
            const player = document.getElementById("music-player");
            const img = document.getElementById("player-image");
            const audio = document.getElementById("audio");

            const states = [
                { img: "static/empty_player.png", song: null },
                { img: "static/song_1.png", song: "static/pipopipo.mp3" },
                { img: "static/song_3.png", song: "static/love..mp3" },
                { img: "static/song_2.png", song: "static/cute_circus.mp3" },
                { img: "static/song_4.png", song: "static/bad.mp3" },
            ];

            let currentState = 0;

            function updatePlayer() {
                const state = states[currentState];
                img.src = state.img;
                if (state.song) {
                    audio.src = state.song;
                    audio.play().catch(() => {});
                } else {
                    audio.pause();
                    audio.currentTime = 0;
                }
            }

            player.addEventListener("click", () => {
                currentState = (currentState + 1) % states.length;
                updatePlayer();
            });
            audio.addEventListener("ended", () => {
                currentState = (currentState + 1) % states.length;
                if (currentState === 0) currentState = 1;
                updatePlayer();
            });
        </script>

        <script>
        function playMusic() {
            document.getElementById("bg-music").play();
        }
        </script>
        <script>
            function spawnJellyfish() {
                const container = document.getElementById("jellyfish-container");

                const jelly = document.createElement("img");
                // choose jelly color
                const randomBinary = Math.floor(Math.random() * 2);
                if (randomBinary == 0) {
                    var jellyfishString = "light_blue_jellyfish.gif"
                }
                else {
                    var jellyfishString = "dark_blue_jellyfish.gif"
                }
                jelly.src = "static/" + jellyfishString;
                jelly.className = "jellyfish";

                // random x
                jelly.style.left = Math.random() * 100 + "vw";

                // random size jellyfish
                const size = 40 + Math.random() * 60;
                jelly.style.width = size + "px";

                // random speed (Duration)
                const duration = 8 + Math.random() * 10;
                jelly.style.animationDuration = duration + "s";

                container.appendChild(jelly);

                // remove after animation done
                setTimeout(() => {
                    jelly.remove();
                }, duration * 1000);
            }

            // spawn every 1-2 seconds
            setInterval(() => {
                spawnJellyfish();
            }, 1000 + Math.random() * 1000);
           



            fetch("static/fish_data_clean.json").then(res => res.json()).then(data => {
                const seed = new Date().toDateString();
                let hash = 0;
                for (let i = 0; i < seed.length; i++) {
                    hash = (hash * 31 + seed.charCodeAt(i)) % data.length;
                }
                const fish = data[hash];
                document.getElementById("fish-info").innerHTML = `
                    <h2>${fish.common_name}</h2>
                    <h3><i>${fish.scientific_name}</i></h3>
                    <img src="${fish.fishbase_image}" width="400">
                    <p><strong>Water Type:</strong> ${fish.water_type}</p>
                    <p><strong>Depth:</strong> ${fish.depth_range_m} m</p>
                    <p><strong>Max Length:</strong> ${fish.max_length_cm} cm</p>
                `;
            });
        </script>
    </body>
</html>
